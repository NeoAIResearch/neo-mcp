services:
  neo-mcp:
    image: ghcr.io/heyneo/neo-mcp-server:latest
    container_name: neo-mcp
    restart: unless-stopped
    env_file: .env
    ports:
      # Bind only to localhost — nginx is the public entry point
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
