services:
  - type: web
    name: neo-mcp-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NEO_TRANSPORT
        value: http
      - key: NEO_HTTP_HOST
        value: "0.0.0.0"
      # NEO_HTTP_PORT is read from Render's injected PORT variable automatically.
      # NEO_API_KEY and NEO_SECRET_KEY are NOT set here.
      # Keys are per-user — each MCP client passes them via request headers:
      #   x-access-key: ak-v1-...
      #   Authorization: Bearer sk-v1-...
    healthCheckPath: /health
