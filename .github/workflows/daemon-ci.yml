name: Daemon CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

jobs:
  npm-daemon-matrix:
    name: npm daemon (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20]

    defaults:
      run:
        working-directory: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: npm/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  python-server-smoke:
    name: python server smoke (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python
          python -m pip install pytest

      - name: Run focused server tests
        run: |
          pytest -q python/tests/test_server.py -k "NeoSubmitTask or NpmDaemonRunning"
