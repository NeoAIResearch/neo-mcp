# fly.toml — Fly.io deployment config for neo-mcp HTTP connector
# Deploy with: fly launch --no-deploy && fly secrets set NEO_API_KEY=... NEO_SECRET_KEY=... && fly deploy

app = "neo-mcp"         # overridden by `fly launch` — just a placeholder
primary_region = "iad"  # US East; change to nearest: lhr, cdg, sin, syd, etc.

[build]
  dockerfile = "Dockerfile"

[env]
  NEO_TRANSPORT = "http"
  NEO_HTTP_HOST = "0.0.0.0"
  NEO_HTTP_PORT = "8000"

# NEO_API_KEY and NEO_SECRET_KEY are NOT set on the server.
# Keys are per-user — each MCP client passes them via request headers:
#   x-access-key: ak-v1-...
#   Authorization: Bearer sk-v1-...

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
